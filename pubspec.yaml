name: diary_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # 本地存储
  shared_preferences: ^2.2.0
  # 日历组件
  table_calendar: ^3.0.9
  # 日期格式化
  intl: ^0.20.2
  # 图片选择器 - 使用最新版本
  image_picker: ^1.0.0
  # HTTP 请求
  http: ^1.0.0
  # Google 字体
  google_fonts: ^6.1.0
  # 图片查看器
  photo_view: ^0.15.0
  # 视频播放器
  video_player: ^2.8.2
  # 文件选择器（用于导入导出）
  file_picker: ^8.0.0+1
  # 路径提供者
  path_provider: ^2.1.2
  # 分享功能
  share_plus: ^10.0.0
  # 压缩文件（用于导出图片）
  archive: ^3.4.10
  # 打开文件/文件夹
  open_filex: ^4.3.4
  # 打开文件管理器
  open_file_manager: ^2.0.0
  # 本地通知
  flutter_local_notifications: ^18.0.1
  # 时区支持（用于定时通知）
  timezone: ^0.10.0
  # LangChain Dart 用于 AI 功能增强
  langchain: ^0.7.7+2
  langchain_openai: ^0.7.3+1
  # 持久化数据库（用于向量存储）
  sembast: ^3.8.4
  path: ^1.9.0
  gallery_saver_plus: ^3.2.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # 应用图标生成器
  flutter_launcher_icons: ^0.14.3

# 强制使用特定版本的插件，这些版本使用 compileSdk 35
dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.22
  image_picker_android: 0.8.12+19

flutter:
  uses-material-design: true
  assets:
    - assets/images/txbb.png
    - assets/images/APP_ICON.jpg

# 应用图标配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/APP_ICON.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/APP_ICON.jpg"
